services:
  - type: web
    name: marketing-suite
    env: node
    plan: free
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm db:push && pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: marketing-suite-db
          property: connectionString
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false

databases:
  - name: marketing-suite-db
    plan: free
    postgresMajorVersion: "14"
